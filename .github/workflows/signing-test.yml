# 260618Cl SignPath 署名の CI 疎通テスト (Phase A・使い捨て)。
#   portable single-file ReciPro.exe を test-signing ポリシーで署名し、署名済み exe を成果物として出すだけ。
#   ★リリース/タグは一切作らない (workflow_dispatch 手動起動のみ)。
#   CI → SignPath → 署名済みファイルの配管確認が目的。検証が済んだら release.yml へ統合し、本ファイルは削除する。
name: SignPath signing smoke test (test-signing)

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  sign-test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish portable single-file exe (unsigned)
        shell: pwsh
        run: |
          $out = "artifacts/to-sign"
          if (Test-Path $out) { Remove-Item $out -Recurse -Force }
          # release.yml の portable publish と同等 (native DLL の後コピーは署名に不要なので省略)。
          # 260618Cl SatelliteResourceLanguages のセミコロンは MSBuild の property 区切りと衝突するため %3B でエスケープ。
          #   引用符ではセミコロンが MSBuild に素通りして MSB1006 "Switch: ja" で失敗する (release.yml の 11 言語版も要同修正)。
          dotnet publish ReciPro/ReciPro.csproj `
            -c Release -r win-x64 --self-contained true -p:Platform=x64 `
            -p:PublishSingleFile=true -p:PublishTrimmed=false `
            -p:SatelliteResourceLanguages=en%3Bja%3Bde%3Bfr%3Bes%3Bpt%3Bit%3Bru%3Bzh-Hans%3Bzh-Hant%3Bko `
            -o $out
          if ($LASTEXITCODE -ne 0) { throw "publish failed (exit $LASTEXITCODE)" }
          if (-not (Test-Path "$out/ReciPro.exe")) { throw "ReciPro.exe not produced" }
          # 署名対象は ReciPro.exe のみ (artifact configuration が <zip-file><pe-file path=\"ReciPro.exe\"> を期待)。
          # libxrl-11.dll 等の loose file を除外し、アップロードフォルダに ReciPro.exe だけを残す。
          Get-ChildItem $out -Exclude "ReciPro.exe" | Remove-Item -Recurse -Force
          # 署名前は未署名であることを確認 (SignPath が実際に署名を付けたことを後段で証明するため)。
          $pre = Get-AuthenticodeSignature -LiteralPath "$out/ReciPro.exe"
          if ($pre.SignerCertificate) {
            throw "unsigned publish output unexpectedly already signed: $($pre.Status) $($pre.SignerCertificate.Subject)"
          }
          Get-ChildItem $out

      - name: Upload unsigned artifact
        id: upload
        uses: actions/upload-artifact@v6
        with:
          name: recipro-signpath-smoke-unsigned
          path: artifacts/to-sign/ReciPro.exe
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: true

      - name: Submit signing request (SignPath, test-signing)
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 9ae9903a-7afe-48b5-a2fb-f670fd8ba98e
          project-slug: ReciPro
          signing-policy-slug: test-signing
          # SignPath の artifact configuration「Initial version」の slug (zip-file > pe-file path="ReciPro.exe")
          artifact-configuration-slug: initial
          github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 600
          output-artifact-directory: artifacts/signed

      - name: Verify the signed exe
        shell: pwsh
        run: |
          $exe = "artifacts/signed/ReciPro.exe"
          if (-not (Test-Path -LiteralPath $exe)) { throw "signed exe was not downloaded" }
          $sig = Get-AuthenticodeSignature -LiteralPath $exe
          Write-Host "Status  : $($sig.Status)"
          Write-Host "Message : $($sig.StatusMessage)"
          Write-Host "Signer  : $($sig.SignerCertificate.Subject)"
          if (-not $sig.SignerCertificate) { throw "no Authenticode signer certificate present" }
          # テスト証明書は自己署名で未信頼のため Status は Valid にならない (NotTrusted/UnknownError 等が正常)。
          # ただし署名そのものが無い/壊れている場合は失敗させる。
          if ($sig.Status -in @("NotSigned", "HashMismatch")) {
            throw "bad Authenticode signature status: $($sig.Status)"
          }
          Write-Host "Signature present (test certificate). OK."

      - name: Upload signed artifact
        uses: actions/upload-artifact@v6
        with:
          name: recipro-signpath-smoke-signed-testcert
          path: artifacts/signed/ReciPro.exe
          if-no-files-found: error
          retention-days: 1
          overwrite: true
