# 260611Cl 追加: win-arm64 portable ビルドを Actions artifact のみで出力する (release には一切触れない)。
# artifact は GitHub が ZIP で包んで配るため、自前の ZIP 化はしない (二重 ZIP 回避)。
# 配布の段階導入 (方針 §6.1) の第 1 段階: WoA 実機 (Snapdragon Surface 等) での検証用ビルドを CI で再現可能にする。
#   段階 2 = attach-arm64-experimental.yml で既存 release へ後付け添付 (実機検証の安定後)
#   段階 3 = release.yml の後続 job へ統合 (数リリース安定後)
# x64 リリース (release.yml) とは完全に独立。bin\Release は共有しない (csproj/vcxproj 側で出力分離済み、方針 §3.2)。
# 方針: .project-guidance/ReciPro_ARM64化方針.md §6
name: Build ARM64 portable ZIP (experimental, artifact only)

on:
  workflow_dispatch:
  # 260612Cl 追加: attach-arm64-experimental.yml (配布の段階 2) から reusable workflow として呼び出し、
  # ビルド + 検査ロジックを 1 か所に保つ (二重保守の回避)。outputs は呼び出し側が ZIP 命名と
  # 「添付先 release tag との版数一致」検査に使う
  workflow_call:
    outputs:
      version:
        description: "Version.cs の History 先頭から解析したバージョン (例: 4.926)"
        value: ${{ jobs.build.outputs.version }}
      artifact_name:
        description: "upload-artifact 名 (中身は ReciPro フォルダ 1 個)"
        value: ${{ jobs.build.outputs.artifact_name }}

permissions:
  contents: read

jobs:
  build:
    # 260612Cl 追加: workflow_call 用の outputs (workflow_dispatch 単独実行では未使用)
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ReciPro-v.${{ steps.version.outputs.version }}-win-arm64-experimental-portable
    # release.yml と同じイメージ (VC.Tools.ARM64 + ClangCL プリインストール、x64 ホストから ARM64 クロスビルド可。方針 §1.3)
    # 注意: windows-2025-vs2026 は VS2026 移行期の一時ラベル。release.yml を windows-2025 へ戻すときはここも揃えること
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse version
        id: version
        shell: pwsh
        run: |
          # release.yml と同じ規則で Version.cs の History 先頭からバージョンを得る (release の存在確認はしない: artifact のみのため)
          $content = Get-Content "ReciPro\Version.cs" -Raw
          if ($content -notmatch 'ver(\d+\.\d+)\(') {
            throw "Could not parse version from Version.cs History."
          }
          $ver = $Matches[1]

          # AssemblyVersion / FileVersion 用のタイムスタンプ (release.yml と同形式、ビルド追跡用)
          $now = [System.DateTime]::UtcNow
          $assemblyVer = "$($now.Year).$($now.Month).$($now.Day).$($now.ToString('HHmm'))"

          Write-Host "Version: $ver (assembly: $assemblyVer)"
          "version=$ver"                  >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVer" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore managed dependencies
        shell: pwsh
        run: dotnet restore ReciPro\ReciPro.csproj

      - name: Find devenv.com
        id: devenv
        shell: pwsh
        run: |
          $devenvExe = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property productPath).Trim()
          if (-not $devenvExe) { throw "Visual Studio was not found." }
          $cli = [System.IO.Path]::ChangeExtension($devenvExe, ".com")
          if (-not (Test-Path $cli)) { throw "devenv.com was not found." }
          Write-Host "devenv.com: $cli"
          "cli=$cli" >> $env:GITHUB_OUTPUT

      - name: Build native ARM64 binary (Crystallography.Native, ClangCL cross-build)
        shell: pwsh
        run: |
          # sln の Release|ARM64 構成 (260611Cl 追加) は Crystallography.Native のみ Build.0。
          # 出力は ReciPro\bin\Release\ARM64\ に分離され、x64 の bin\Release は汚れない (方針 §3.2)
          $log = Join-Path $env:RUNNER_TEMP "devenv-native-arm64.log"
          & "${{ steps.devenv.outputs.cli }}" "ReciPro.sln" /Build "Release|ARM64" /Project "Crystallography.Native" /Out $log
          if (Test-Path $log) { Get-Content $log }
          if ($LASTEXITCODE -ne 0) { throw "Crystallography.Native ARM64 build failed (exit $LASTEXITCODE)." }
          if (-not (Test-Path "ReciPro\bin\Release\ARM64\Crystallography.Native.dll")) {
            throw "ReciPro\bin\Release\ARM64\Crystallography.Native.dll was not produced."
          }

      - name: Publish win-arm64 self-contained
        id: publish
        shell: pwsh
        run: |
          # csproj 側の配線 (方針 §3.7) が publish 単独での完全性を保証する:
          #   - AddArm64CrystallographyNativeToPublish ターゲット: native 欠落時は Error
          #   - native\win-arm64\ の libxrl-11.dll / glfw3.dll / glfw3.LICENSE.txt を RID 条件 Content で平坦化
          #   - x64 用 libxrl-11.dll (リポルート) は RID 排他条件で混入しない
          # 260611Cl SatelliteResourceLanguages=ja: self-contained publish は .NET ランタイム (WinForms/WPF) の
          # ローカライズリソースを 13 言語分 (~18MB) 同梱するが、アプリが提供する UI は neutral(en)+ja のみなので
          # ja だけ残す (アプリ自身のサテライト ja\*.resources.dll は維持される)。csproj には入れず publish 引数に
          # 留める: x64 MSI (vdproj の LocalizedResourceDlls 自動収集) のビルド経路に影響させないため
          # 260611Cl PublishSingleFile=true: フラット 292 ファイルから「ReciPro.exe + データ数個 + native」へ
          # (Surface 検証での作者要望)。ランタイム・managed DLL・ja サテライト・libxrl/glfw は exe に埋め込み。
          # Crystallography.Native.dll のみ csproj の ExcludeFromSingleFile で exe 横に外置き (NativeWrapper の
          # BaseDirectory 解決を確実に通すため。x64 release.yml の後コピー方式と構成を揃える)
          $publishDir = Join-Path $env:RUNNER_TEMP "ReciPro-arm64-portable\ReciPro"
          dotnet publish ReciPro\ReciPro.csproj `
            -c Release `
            -r win-arm64 `
            -p:Platform=ARM64 `
            --self-contained true `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} `
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:SatelliteResourceLanguages=ja `
            -o $publishDir
          "dir=$publishDir" >> $env:GITHUB_OUTPUT

      - name: Verify publish output (required files, PE machine, bundled natives, no x64 leakage)
        shell: pwsh
        run: |
          $publishDir = "${{ steps.publish.outputs.dir }}"

          # 必須ファイルの存在検査 (方針 §6.3。欠落は「ビルド緑・実行時死亡」型なのでここで止める)。
          # 260611Cl single-file 化に伴い改訂: ランタイム (coreclr/hostfxr 等)・libxrl・glfw は exe に埋め込まれ、
          # 外に残るのは ReciPro.exe + 外置き native (Crystallography.Native.dll) + コンテンツのみ
          $required = @("ReciPro.exe", "Crystallography.Native.dll", "AMCSD.cdb3", "initial.xml")
          foreach ($f in $required) {
            if (-not (Test-Path (Join-Path $publishDir $f))) { throw "Required file missing from publish output: $f" }
          }

          # single-file バンドルの健全性: exe サイズ (self-contained ランタイム埋め込みなら >150MB) と、
          # バンドルマニフェスト内のファイル名 (ASCII) で libxrl/glfw の同梱を確認 (無警告欠落の防止)
          $exePath = Join-Path $publishDir "ReciPro.exe"
          $exeSize = (Get-Item $exePath).Length
          "ReciPro.exe size: {0:f1} MB" -f ($exeSize / 1MB)
          if ($exeSize -lt 150MB) { throw "ReciPro.exe is too small ($([math]::Round($exeSize/1MB)) MB) - single-file self-contained bundling did not happen?" }
          $exeText = [Text.Encoding]::ASCII.GetString([IO.File]::ReadAllBytes($exePath))
          foreach ($n in @("libxrl-11.dll", "glfw3.dll", "ReciPro.resources.dll")) {
            if (-not $exeText.Contains($n)) { throw "Bundled file '$n' not found inside the single-file exe." }
            Write-Host "bundled: $n"
          }

          # x64 専用 flavor (avx2/avx512) が紛れていないこと (arm64 は generic/NEON 1 本のみ)
          $avx = Get-ChildItem $publishDir -Filter "Crystallography.Native.avx*.dll" -ErrorAction SilentlyContinue
          if ($avx) { throw "x64 AVX flavors leaked into arm64 publish: $($avx.Name -join ', ')" }

          # ネイティブ PE が ARM64 (machine=0xAA64) であること。バンドル内 native は供給元 (リポの native\win-arm64\) を検査
          function Get-PEMachine([string]$path) {
            $b = [IO.File]::ReadAllBytes($path)
            $pe = [BitConverter]::ToInt32($b, 0x3C)
            return [BitConverter]::ToUInt16($b, $pe + 4)
          }
          $peTargets = @(
            (Join-Path $publishDir "ReciPro.exe"),
            (Join-Path $publishDir "Crystallography.Native.dll"),
            "ReciPro\native\win-arm64\libxrl-11.dll",
            "ReciPro\native\win-arm64\glfw3.dll"
          )
          foreach ($f in $peTargets) {
            $m = Get-PEMachine $f
            "{0}: machine=0x{1:X4}" -f (Split-Path $f -Leaf), $m
            if ($m -ne 0xAA64) { throw "$f is not ARM64 (machine=0x$($m.ToString('X4')))" }
          }

          # 自前ビルド native の CRT 静的リンク (/MT) 検査: VCRUNTIME/MSVCP 依存が出たら
          # クリーン WoA (arm64 VC redist 無し) で黙殺フォールバックする型の故障 (方針 §3.5)。
          # libxrl/glfw はバンドル内のため供給元 (native\win-arm64\) を検査する。
          # 併せて Crystallography.Native.dll の代表 export を確認 (AA64 だが P/Invoke で死ぬ型を検出)
          $dumpbin = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -find "**\Hostx64\x64\dumpbin.exe" | Select-Object -First 1)
          if (-not $dumpbin) { throw "dumpbin.exe was not found (needed for CRT/export verification)." }
          foreach ($f in @((Join-Path $publishDir "Crystallography.Native.dll"), "ReciPro\native\win-arm64\libxrl-11.dll", "ReciPro\native\win-arm64\glfw3.dll")) {
            $deps = & $dumpbin /dependents $f | Out-String
            Write-Host "--- $(Split-Path $f -Leaf) dependents ---"; Write-Host $deps
            if ($deps -match "VCRUNTIME|MSVCP") { throw "$f depends on the dynamic CRT (expected static /MT, see ARM64 policy section 3.5)" }
          }
          $exports = & $dumpbin /exports (Join-Path $publishDir "Crystallography.Native.dll") | Out-String
          foreach ($sym in @("_CBEDSolver_Eigen", "_Inverse", "_EigenSolver")) {
            if ($exports -notmatch [regex]::Escape($sym)) { throw "Crystallography.Native.dll is missing expected export: $sym" }
          }
          Write-Host "Publish output verified: single-file bundle complete, all native PEs ARM64, static CRT, exports present."

      - name: Prepare portable folder
        id: portable
        shell: pwsh
        run: |
          $publishDir = "${{ steps.publish.outputs.dir }}"
          # x64 の portable ZIP (release.yml) と同じ整形: 分離 pdb 除去 + LICENSE + README (arm64 専用版)。
          # README は配布フォルダ内では README-PORTABLE.txt の名前で置く: FormMain.cs:352 がこの固定名の存在で
          # portable 判定して Check Updates メニューを隠すため (codex レビュー指摘)
          Get-ChildItem $publishDir -Filter "*.pdb" | Remove-Item -Force
          Copy-Item "LICENSE.md" $publishDir -Force
          Copy-Item "README-PORTABLE-ARM64.txt" (Join-Path $publishDir "README-PORTABLE.txt") -Force

          # 260611Cl 自前の ZIP 化はしない: Actions artifact はダウンロード時に GitHub が必ず ZIP で包むため、
          # ここで ZIP を作ると二重 ZIP (2 回解凍) になる (Surface 検証で指摘)。フォルダのまま artifact に渡し、
          # release 添付用の ZIP 化 + SHA256SUMS-win-arm64-experimental.txt は段階 2 (attach-arm64-experimental.yml) で行う。
          # 親フォルダを渡すことで artifact ZIP 直下に ReciPro\ フォルダが入る (x64 portable ZIP と同じ構造)
          "root=$(Split-Path $publishDir -Parent)" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ReciPro-v.${{ steps.version.outputs.version }}-win-arm64-experimental-portable
          path: ${{ steps.portable.outputs.root }}
