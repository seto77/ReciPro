# 260611Cl 追加: win-arm64 portable ビルドを Actions artifact のみで出力する (release には一切触れない)。
# artifact は GitHub が ZIP で包んで配るため、自前の ZIP 化はしない (二重 ZIP 回避)。
# 配布の段階導入 (方針 §6.1) の第 1 段階: WoA 実機 (Snapdragon Surface 等) での検証用ビルドを CI で再現可能にする。
#   段階 2 = attach-arm64-experimental.yml で既存 release へ後付け添付 (実機検証の安定後)
#   段階 3 = release.yml の後続 job へ統合 (数リリース安定後)
# x64 リリース (release.yml) とは完全に独立。bin\Release は共有しない (csproj/vcxproj 側で出力分離済み、方針 §3.2)。
# 方針: .project-guidance/ReciPro_ARM64化方針.md §6
name: Build ARM64 portable ZIP and MSI (experimental, artifact only)

on:
  workflow_dispatch:
  # 260612Cl 追加: attach-arm64-experimental.yml (配布の段階 2) から reusable workflow として呼び出し、
  # ビルド + 検査ロジックを 1 か所に保つ (二重保守の回避)。outputs は呼び出し側が ZIP 命名と
  # 「添付先 release tag との版数一致」検査に使う
  workflow_call:
    # 260623Cl Phase 3 (release.yml への inline 統合): 呼び出し元が assembly_version を渡せるようにする。
    #   同一 run で x64 (release.yml) と arm64 の FileVersion を完全一致させるため (cross-grade 要件、WiX計画 Phase A)。
    #   未指定 (単独 dispatch / attach-arm64 の backfill) は従来どおり tag v.<ver> の commit 時刻にアンカーする。
    inputs:
      assembly_version:
        description: "AssemblyVersion/FileVersion (yyyy.M.d.HHmm)。空なら tag commit 時刻 (無ければ UtcNow) を使う"
        type: string
        required: false
        default: ""
    outputs:
      version:
        description: "Version.cs の History 先頭から解析したバージョン (例: 4.926)"
        value: ${{ jobs.build.outputs.version }}
      artifact_name:
        description: "upload-artifact 名 (中身は ReciPro フォルダ 1 個)"
        value: ${{ jobs.build.outputs.artifact_name }}
      # 260613Cl Phase C: arm64 MSI (WiX) の artifact 名 (中身は ReciPro-setup_arm64.msi 1 個。
      # アセット改名 260613Cl: 旧 ReciProSetup-arm64.msi)
      msi_artifact_name:
        description: "arm64 MSI の upload-artifact 名"
        value: ${{ jobs.build.outputs.msi_artifact_name }}

permissions:
  contents: read

jobs:
  build:
    # 260612Cl 追加: workflow_call 用の outputs (workflow_dispatch 単独実行では未使用)
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ReciPro-v.${{ steps.version.outputs.version }}-win-arm64-experimental-portable
      # 260613Cl アセット改名 (旧: ReciProSetup-arm64-msi-v.X)
      msi_artifact_name: ReciPro-setup_arm64-msi-v.${{ steps.version.outputs.version }}
    # release.yml と同じイメージ (VC.Tools.ARM64 + ClangCL プリインストール、x64 ホストから ARM64 クロスビルド可。方針 §1.3)
    # 注意: windows-2025-vs2026 は VS2026 移行期の一時ラベル。release.yml を windows-2025 へ戻すときはここも揃えること
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive # 260624Cl shared libs are git submodules

      - name: Parse version
        id: version
        shell: pwsh
        run: |
          # release.yml と同じ規則で Version.cs の History 先頭からバージョンを得る (release の存在確認はしない: artifact のみのため)
          $content = Get-Content "ReciPro\Version.cs" -Raw
          if ($content -notmatch 'ver(\d+\.\d+)\(') {
            throw "Could not parse version from Version.cs History."
          }
          $ver = $Matches[1]

          # AssemblyVersion / FileVersion 用のタイムスタンプ (release.yml と同形式)
          # 260613Cl Phase C: x64⇔arm64 の same-version cross-grade には両 MSI の FileVersion 完全一致が必要
          #   (WiX計画 Phase A 実測)。release.yml は release commit の時刻を使うため、ここでは tag v.<ver> の
          #   commit 時刻に合わせる (tag は GITHUB_SHA に作られるので一致する)。tag 未作成 (リリース前の
          #   単独 dispatch / dry_run) は UtcNow フォールバック (release には添付されないため影響なし)
          # 260623Cl 呼び出し元 (release.yml inline 統合) が assembly_version を渡したらそれを優先する
          #   (同一 run では tag がまだ無いので tag 時刻参照は使えず、x64 と一致させるには引数渡しが必須)。
          # 旧: $now = [System.DateTime]::UtcNow
          $assemblyVer = '${{ inputs.assembly_version }}'
          if ($assemblyVer) {
            Write-Host "FileVersion provided by caller: $assemblyVer."
          } else {
            $tag = "v.$ver"
            git fetch origin "refs/tags/${tag}:refs/tags/${tag}" --depth=1 2>$null
            $global:LASTEXITCODE = 0
            $iso = (git log -1 --format=%cI $tag 2>$null)
            $global:LASTEXITCODE = 0
            if ($iso) {
              $now = ([System.DateTimeOffset]::Parse($iso)).UtcDateTime
              Write-Host "FileVersion anchored to tag $tag commit time ($iso)."
            } else {
              $now = [System.DateTime]::UtcNow
              Write-Warning "Tag $tag not found; using UtcNow (fine for artifact-only runs; do not attach this MSI to a release)."
            }
            $assemblyVer = "$($now.Year).$($now.Month).$($now.Day).$($now.ToString('HHmm'))"
          }

          Write-Host "Version: $ver (assembly: $assemblyVer)"
          "version=$ver"                  >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVer" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore managed dependencies
        shell: pwsh
        run: dotnet restore ReciPro\ReciPro.csproj

      - name: Find devenv.com
        id: devenv
        shell: pwsh
        run: |
          $devenvExe = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property productPath).Trim()
          if (-not $devenvExe) { throw "Visual Studio was not found." }
          $cli = [System.IO.Path]::ChangeExtension($devenvExe, ".com")
          if (-not (Test-Path $cli)) { throw "devenv.com was not found." }
          Write-Host "devenv.com: $cli"
          "cli=$cli" >> $env:GITHUB_OUTPUT

      - name: Build native ARM64 binary (Crystallography.Native, ClangCL cross-build)
        shell: pwsh
        run: |
          # sln の Release|ARM64 構成 (260611Cl 追加) は Crystallography.Native のみ Build.0。
          # 出力は ReciPro\bin\Release\ARM64\ に分離され、x64 の bin\Release は汚れない (方針 §3.2)
          $log = Join-Path $env:RUNNER_TEMP "devenv-native-arm64.log"
          & "${{ steps.devenv.outputs.cli }}" "ReciPro.sln" /Build "Release|ARM64" /Project "Crystallography.Native" /Out $log
          if (Test-Path $log) { Get-Content $log }
          if ($LASTEXITCODE -ne 0) { throw "Crystallography.Native ARM64 build failed (exit $LASTEXITCODE)." }
          if (-not (Test-Path "ReciPro\bin\Release\ARM64\Crystallography.Native.dll")) {
            throw "ReciPro\bin\Release\ARM64\Crystallography.Native.dll was not produced."
          }

      - name: Publish win-arm64 self-contained
        id: publish
        shell: pwsh
        run: |
          # csproj 側の配線 (方針 §3.7) が publish 単独での完全性を保証する:
          #   - AddArm64CrystallographyNativeToPublish ターゲット: native 欠落時は Error
          #   - native\win-arm64\ の libxrl-11.dll / glfw3.dll / glfw3.LICENSE.txt を RID 条件 Content で平坦化
          #   - x64 用 libxrl-11.dll (リポルート) は RID 排他条件で混入しない
          # 260611Cl / 260617Cl SatelliteResourceLanguages: self-contained publish は .NET ランタイム (WinForms/WPF) の
          # ローカライズリソースを 13 言語分 (~18MB) 同梱するが、アプリが提供する言語 (Crystallography.SupportedCultures)
          # に合わせて絞る。★この一覧から外れた言語はアプリ自身のサテライト DLL も含め ZIP から無言で除外されるため、
          # 新言語を出荷する際は必ずここへ追加すること (多言語化方針 Phase 0)。csproj には入れず publish 引数に
          # 留める: x64 MSI (vdproj の LocalizedResourceDlls 自動収集) のビルド経路に影響させないため。
          # 260621Cl 修正: セミコロン区切りは ';' が二重に問題になる -- PowerShell の文区切りに加え、
          # MSBuild の -p: は ';' をプロパティ区切りと解釈するため、単一引用符で囲むだけでは
          # 'SatelliteResourceLanguages=en' しか渡らず ja/de/... の全サテライトが脱落 (実測で publish 失敗)。
          # release.yml / signing-test.yml と同じく ';' を '%3B' でエスケープして統一する (3-D packaging 検査)。
          # 旧: -p:SatelliteResourceLanguages='en;ja;de;fr;es;pt;it;ru;zh-Hans;zh-Hant;ko'
          # 260611Cl PublishSingleFile=true: フラット 292 ファイルから「ReciPro.exe + データ数個 + native」へ
          # (Surface 検証での作者要望)。ランタイム・managed DLL・ja サテライト・libxrl/glfw は exe に埋め込み。
          # Crystallography.Native.dll のみ csproj の ExcludeFromSingleFile で exe 横に外置き (NativeWrapper の
          # BaseDirectory 解決を確実に通すため。x64 release.yml の後コピー方式と構成を揃える)
          $publishDir = Join-Path $env:RUNNER_TEMP "ReciPro-arm64-portable\ReciPro"
          dotnet publish ReciPro\ReciPro.csproj `
            -c Release `
            -r win-arm64 `
            -p:Platform=ARM64 `
            --self-contained true `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} `
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:SatelliteResourceLanguages=en%3Bja%3Bde%3Bfr%3Bes%3Bpt%3Bit%3Bru%3Bzh-Hans%3Bzh-Hant%3Bko `
            -o $publishDir
          "dir=$publishDir" >> $env:GITHUB_OUTPUT

      - name: Verify publish output (required files, PE machine, bundled natives, no x64 leakage)
        shell: pwsh
        run: |
          $publishDir = "${{ steps.publish.outputs.dir }}"

          # 必須ファイルの存在検査 (方針 §6.3。欠落は「ビルド緑・実行時死亡」型なのでここで止める)。
          # 260611Cl single-file 化に伴い改訂: ランタイム (coreclr/hostfxr 等)・libxrl・glfw は exe に埋め込まれ、
          # 外に残るのは ReciPro.exe + 外置き native (Crystallography.Native.dll) + コンテンツのみ
          $required = @("ReciPro.exe", "Crystallography.Native.dll", "AMCSD.cdb3", "initial.xml")
          foreach ($f in $required) {
            if (-not (Test-Path (Join-Path $publishDir $f))) { throw "Required file missing from publish output: $f" }
          }

          # single-file バンドルの健全性: exe サイズ (self-contained ランタイム埋め込みなら >150MB) と、
          # バンドルマニフェスト内のファイル名 (ASCII) で libxrl/glfw の同梱を確認 (無警告欠落の防止)
          $exePath = Join-Path $publishDir "ReciPro.exe"
          $exeSize = (Get-Item $exePath).Length
          "ReciPro.exe size: {0:f1} MB" -f ($exeSize / 1MB)
          if ($exeSize -lt 150MB) { throw "ReciPro.exe is too small ($([math]::Round($exeSize/1MB)) MB) - single-file self-contained bundling did not happen?" }
          $exeText = [Text.Encoding]::ASCII.GetString([IO.File]::ReadAllBytes($exePath))
          foreach ($n in @("libxrl-11.dll", "glfw3.dll", "ReciPro.resources.dll")) {
            if (-not $exeText.Contains($n)) { throw "Bundled file '$n' not found inside the single-file exe." }
            Write-Host "bundled: $n"
          }

          # x64 専用 flavor (avx2/avx512) が紛れていないこと (arm64 は generic/NEON 1 本のみ)
          $avx = Get-ChildItem $publishDir -Filter "Crystallography.Native.avx*.dll" -ErrorAction SilentlyContinue
          if ($avx) { throw "x64 AVX flavors leaked into arm64 publish: $($avx.Name -join ', ')" }

          # ネイティブ PE が ARM64 (machine=0xAA64) であること。バンドル内 native は供給元 (リポの native\win-arm64\) を検査
          function Get-PEMachine([string]$path) {
            $b = [IO.File]::ReadAllBytes($path)
            $pe = [BitConverter]::ToInt32($b, 0x3C)
            return [BitConverter]::ToUInt16($b, $pe + 4)
          }
          $peTargets = @(
            (Join-Path $publishDir "ReciPro.exe"),
            (Join-Path $publishDir "Crystallography.Native.dll"),
            "ReciPro\native\win-arm64\libxrl-11.dll",
            "ReciPro\native\win-arm64\glfw3.dll"
          )
          foreach ($f in $peTargets) {
            $m = Get-PEMachine $f
            "{0}: machine=0x{1:X4}" -f (Split-Path $f -Leaf), $m
            if ($m -ne 0xAA64) { throw "$f is not ARM64 (machine=0x$($m.ToString('X4')))" }
          }

          # 自前ビルド native の CRT 静的リンク (/MT) 検査: VCRUNTIME/MSVCP 依存が出たら
          # クリーン WoA (arm64 VC redist 無し) で黙殺フォールバックする型の故障 (方針 §3.5)。
          # libxrl/glfw はバンドル内のため供給元 (native\win-arm64\) を検査する。
          # 併せて Crystallography.Native.dll の代表 export を確認 (AA64 だが P/Invoke で死ぬ型を検出)
          $dumpbin = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -find "**\Hostx64\x64\dumpbin.exe" | Select-Object -First 1)
          if (-not $dumpbin) { throw "dumpbin.exe was not found (needed for CRT/export verification)." }
          foreach ($f in @((Join-Path $publishDir "Crystallography.Native.dll"), "ReciPro\native\win-arm64\libxrl-11.dll", "ReciPro\native\win-arm64\glfw3.dll")) {
            $deps = & $dumpbin /dependents $f | Out-String
            # 260612Cl dumpbin 自体の失敗を即時検出 (失敗で $deps が空だと CRT 検査が空振り pass する、codex レビュー指摘)
            if ($LASTEXITCODE -ne 0) { throw "dumpbin /dependents failed for $f (exit $LASTEXITCODE)." }
            Write-Host "--- $(Split-Path $f -Leaf) dependents ---"; Write-Host $deps
            if ($deps -match "VCRUNTIME|MSVCP") { throw "$f depends on the dynamic CRT (expected static /MT, see ARM64 policy section 3.5)" }
          }
          $exports = & $dumpbin /exports (Join-Path $publishDir "Crystallography.Native.dll") | Out-String
          if ($LASTEXITCODE -ne 0) { throw "dumpbin /exports failed (exit $LASTEXITCODE)." } # 260612Cl
          foreach ($sym in @("_CBEDSolver_Eigen", "_Inverse", "_EigenSolver")) {
            if ($exports -notmatch [regex]::Escape($sym)) { throw "Crystallography.Native.dll is missing expected export: $sym" }
          }
          Write-Host "Publish output verified: single-file bundle complete, all native PEs ARM64, static CRT, exports present."

      - name: Prepare portable folder
        id: portable
        shell: pwsh
        run: |
          $publishDir = "${{ steps.publish.outputs.dir }}"
          # x64 の portable ZIP (release.yml) と同じ整形: 分離 pdb 除去 + LICENSE + README (arm64 専用版)。
          # README は配布フォルダ内では README-PORTABLE.txt の名前で置く: FormMain.cs:352 がこの固定名の存在で
          # portable 判定して Check Updates メニューを隠すため (codex レビュー指摘)
          Get-ChildItem $publishDir -Filter "*.pdb" | Remove-Item -Force
          Copy-Item "LICENSE.md" $publishDir -Force
          Copy-Item "README-PORTABLE-ARM64.txt" (Join-Path $publishDir "README-PORTABLE.txt") -Force

          # 260611Cl 自前の ZIP 化はしない: Actions artifact はダウンロード時に GitHub が必ず ZIP で包むため、
          # ここで ZIP を作ると二重 ZIP (2 回解凍) になる (Surface 検証で指摘)。フォルダのまま artifact に渡し、
          # release 添付用の ZIP 化は段階 2 (attach-arm64-experimental.yml) で行う (260613Cl checksum は公開廃止)。
          # 親フォルダを渡すことで artifact ZIP 直下に ReciPro\ フォルダが入る (x64 portable ZIP と同じ構造)
          "root=$(Split-Path $publishDir -Parent)" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ReciPro-v.${{ steps.version.outputs.version }}-win-arm64-experimental-portable
          path: ${{ steps.portable.outputs.root }}

      # ---- 260613Cl Phase C: arm64 MSI (WiX、計画書 .project-guidance/ReciPro_WiX移行計画.md §5.2) ----
      # MSI は x64 と同じ framework-dependent (portable ZIP の self-contained と役割分担)。
      # 検査セットは validate-wix-msi.yml の arm64 staging と同一
      - name: Stage arm64 MSI payload (framework-dependent publish)
        shell: pwsh
        run: |
          $s = "artifacts\staging-msi-arm64"
          dotnet publish ReciPro\ReciPro.csproj -c Release -r win-arm64 -p:Platform=ARM64 --self-contained false -o $s `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          if ($LASTEXITCODE -ne 0) { throw "arm64 framework-dependent publish failed." }
          Copy-Item ReciProSetup.Wix\LICENSE.rtf, ReciProSetup.Wix\REQUIREMENT.rtf $s
          Get-ChildItem $s -Filter *.pdb | Remove-Item
          if (Test-Path "$s\README-PORTABLE.txt") { throw "README-PORTABLE.txt leaked (portable marker must not be in MSI)" }
          if (Test-Path "$s\coreclr.dll") { throw "self-contained runtime leaked into framework-dependent staging" }
          $nat = Get-ChildItem $s -Filter "Crystallography.Native*.dll"
          if ($nat.Count -ne 1) { throw "arm64 native DLL count != 1: $($nat.Count)" }
          if (-not (Test-Path "$s\libxrl-11.dll") -or -not (Test-Path "$s\glfw3.dll")) { throw "arm64 native deps (libxrl/glfw) missing" }
          function Get-PEMachine([string]$path) {
            $b = [IO.File]::ReadAllBytes($path)
            return [BitConverter]::ToUInt16($b, [BitConverter]::ToInt32($b, 0x3C) + 4)
          }
          foreach ($f in 'ReciPro.exe','Crystallography.Native.dll','libxrl-11.dll','glfw3.dll') {
            $m = Get-PEMachine (Join-Path $PWD "$s\$f")
            if ($m -ne 0xAA64) { throw ("{0}: PE machine 0x{1:X4} != 0xAA64" -f $f, $m) }
          }
          Write-Host "arm64 MSI staging OK: $((Get-ChildItem $s -Recurse -File).Count) files"

      - name: Build arm64 MSI with WiX
        shell: pwsh
        run: |
          dotnet build ReciProSetup.Wix\ReciProSetup.wixproj -c Release -p:InstallerPlatform=arm64 `
            -p:ProductVersion=0.${{ steps.version.outputs.version }} `
            -p:StagingDir="$PWD\artifacts\staging-msi-arm64"
          if ($LASTEXITCODE -ne 0) { throw "WiX arm64 build failed (exit $LASTEXITCODE)." }
          # 260613Cl アセット改名 (旧: ReciProSetup-arm64.msi)
          $msi = Get-Item "ReciProSetup.Wix\bin\Release\ReciPro-setup_arm64.msi" -ErrorAction SilentlyContinue
          if (-not $msi) { throw "ReciPro-setup_arm64.msi was not produced." }
          Write-Host "MSI built: $($msi.FullName) ($($msi.Length) bytes)"

          # 260613Cl MSI プロパティ検査はここ (x64 ランナー) で行う: windows-11-arm の COM 遅延バインディングは
          # OpenDatabase が DISP_E_TYPEMISMATCH で失敗する (dry_run 27427847939 で実測) ため、smoke 側では COM を使わない
          $wi = New-Object -ComObject WindowsInstaller.Installer
          $db = $wi.GetType().InvokeMember('OpenDatabase','InvokeMethod',$null,$wi,@($msi.FullName,0))
          $si = $db.GetType().InvokeMember('SummaryInformation','GetProperty',$null,$db,@(0))
          $template = $si.GetType().InvokeMember('Property','GetProperty',$null,$si,@(7))
          $schema = $si.GetType().InvokeMember('Property','GetProperty',$null,$si,@(14))
          function Get-MsiProp($name) {
            $view = $db.GetType().InvokeMember('OpenView','InvokeMethod',$null,$db,@("SELECT Value FROM Property WHERE Property='$name'"))
            $view.GetType().InvokeMember('Execute','InvokeMethod',$null,$view,$null) | Out-Null
            $rec = $view.GetType().InvokeMember('Fetch','InvokeMethod',$null,$view,$null)
            if ($rec) { $rec.GetType().InvokeMember('StringData','GetProperty',$null,$rec,@(1)) } else { $null }
          }
          $uc = Get-MsiProp 'UpgradeCode'; $pv = Get-MsiProp 'ProductVersion'; $au = Get-MsiProp 'ALLUSERS'
          Write-Host "Template=$template Schema=$schema UpgradeCode=$uc ProductVersion=$pv ALLUSERS=$au"
          if ($template -notlike 'Arm64*') { throw "MSI Template is not Arm64: $template" }
          if ([int]$schema -lt 500) { throw "Schema $schema < 500 (Arm64 requirement)" }
          if ($uc -ne '{A81303DC-E1CA-44F3-AE3A-6C7CAC08E8D8}') { throw "UpgradeCode mismatch: $uc" }
          if ($pv -ne '0.${{ steps.version.outputs.version }}') { throw "ProductVersion mismatch: $pv" }
          if ($au) { throw "ALLUSERS must be unset for per-user package (got $au)" }

      - name: Upload arm64 MSI artifact
        uses: actions/upload-artifact@v6
        with:
          # 260613Cl アセット改名 (旧: ReciProSetup-arm64-msi-v.X / ReciProSetup-arm64.msi)
          name: ReciPro-setup_arm64-msi-v.${{ steps.version.outputs.version }}
          path: ReciProSetup.Wix/bin/Release/ReciPro-setup_arm64.msi
