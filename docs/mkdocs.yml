        # 260526Cl: A1 を A1.1(基本座標系)/A1.2(回折) に分割。旧URL(統合A1・旧A2検出器)を新ページへ
        'en/appendix-a1-coordinate-system.md': 'en/appendix/a1-coordinate-system/1-orientation.md'
        'en/appendix/a1-coordinate-system.md': 'en/appendix/a1-coordinate-system/1-orientation.md'
        'en/appendix-a2-detector-coordinate-system.md': 'en/appendix/a1-coordinate-system/2-diffraction.md'
