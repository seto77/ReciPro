# 260525Ch: MkDocs Material configuration for the GitHub Pages manual.
site_name: ReciPro Manual
site_description: ReciPro user manual
site_url: https://seto77.github.io/ReciPro/
repo_url: https://github.com/seto77/ReciPro
repo_name: seto77/ReciPro
edit_uri: edit/master/docs/src/

docs_dir: src
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    # 260525Cl: navigation.sections / navigation.expand を外し、左ナビを「折り畳み可能＋インデント」表示にする。
    #   旧構成 (sections + expand) は入れ子グループを常時展開のセクション見出しにし、全項目が同一階層で羅列されて見にくかった。
    #   注: navigation.indexes (セクション見出し自体をリンク化) は MkDocs では index.md という名前のファイルにしか
    #       効かない (Page.is_index は file.name=='index' のみ真)。本構成は番号付きスラグ名なので使えないため採用しない。
    #       代わりに各セクション先頭の概要ページには nav 側で明示タイトル ("Overview"/"概要") を付ける。
    #       (無題のままだと MkDocs が H1 を拾えず "0 main window" 等のファイル名スラグが題になる。
    #        本文先頭が <!-- nav --> + 言語切替行で、H1 がページ先頭要素にならないため。)
    # - navigation.sections   # 260525Cl 除去
    # - navigation.expand     # 260525Cl 除去
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - ja

# 260525Cl: ページ先頭の言語切替リンク (🌐 English | 日本語) は廃止。ヘッダーの言語セレクタ (extra.alternate) と
#   機能が重複するため。これに伴い docs/hooks/language_switch.py とその参照を削除した。
# hooks:
#   - hooks/language_switch.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  # 260525Cl: ヘッダーの言語セレクタを現在ページの相手言語版へ向け直す (既定だと各言語トップへ戻るため)。
  - assets/javascripts/language_switch.js

extra:
  alternate:
    - name: English
      link: /ReciPro/
      lang: en
    - name: 日本語
      link: /ReciPro/ja/
      lang: ja

