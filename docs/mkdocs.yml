        'en/7-diffraction-simulator/2-x-ray-diffraction.md': 'en/7-diffraction-simulator/4-x-ray-neutron-diffraction.md'
        # 260602Cl: 本日公開した繰り上げ前 (7.1=X線/7.2=SAED/7.3=PED/7.4=CBED) の URL を現ファイル名へ。
        'en/7-diffraction-simulator/1-x-ray-diffraction.md': 'en/7-diffraction-simulator/4-x-ray-neutron-diffraction.md'
