# 260525Cl: ページ先頭の言語切替リンク (🌐 English | 日本語) は廃止。ヘッダーの言語セレクタ (extra.alternate) と
#   機能が重複するため。これに伴い docs/hooks/language_switch.py とその参照を削除した。
# hooks:
#   - hooks/language_switch.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      # 260602Cl: 日本語見出しの slug を機能させる。既定 (python-markdown の ASCII slugify) では
      #   日本語が NFKD→ASCII で消えてアンカーが連番化し、ページ間の `#日本語見出し` リンクが
      #   すべてページ先頭へ落ちていた (mkdocs は INFO 止まりで strict も素通り)。
      #   pymdownx の Unicode slugify へ切替えて日本語アンカーを有効化する (英語アンカーは lower 化で不変)。
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  # 260525Cl 追加: 略語のツールチップ。定義は includes/abbreviations.md に集約し全 md 末尾へ自動付加する。
  - abbr
  - pymdownx.snippets:
      base_path:
        - docs   # CI は repo ルートから `mkdocs build -f docs/mkdocs.yml` を実行
        - .       # docs/ 内から実行した場合のフォールバック
      auto_append:
        - includes/abbreviations.md
  - pymdownx.keys    # 260525Cl 追加: ++ctrl+alt+shift+c++ をキーキャップ風に表示
  - pymdownx.caret   # 260525Cl 追加: ^上付き^ と ^^下線/挿入^^
  - pymdownx.tilde   # 260525Cl 追加: ~下付き~ と ~~取り消し線~~
  - pymdownx.mark    # 260525Cl 追加: ==蛍光ペン強調==

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  # 260525Cl: ヘッダーの言語セレクタを現在ページの相手言語版へ向け直す (既定だと各言語トップへ戻るため)。
  - assets/javascripts/language_switch.js

extra:
  alternate:
    - name: English
      link: /ReciPro/
      lang: en
    - name: 日本語
      link: /ReciPro/ja/
      lang: ja

