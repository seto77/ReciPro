# 260525Ch: MkDocs Material configuration for the GitHub Pages manual.
site_name: ReciPro Manual
site_description: ReciPro user manual
site_url: https://seto77.github.io/ReciPro/
repo_url: https://github.com/seto77/ReciPro
repo_name: seto77/ReciPro
edit_uri: edit/master/docs/src/

docs_dir: src
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    # 260525Cl: navigation.sections / navigation.expand を外し、左ナビを「折り畳み可能＋インデント」表示にする。
    #   旧構成 (sections + expand) は入れ子グループを常時展開のセクション見出しにし、全項目が同一階層で羅列されて見にくかった。
    # 260525Cl: navigation.indexes でセクション見出し自体を概要ページへのリンクにする (独立した「概要」項目を無くす)。
    #   MkDocs は file.name=='index' のページしか section index と認識しない (Page.is_index) ため、
    #   概要ページは docs/src/<lang>/<slug>/index.md の形に置いている (frontmatter で title を付与)。
    # - navigation.sections   # 260525Cl 除去
    # - navigation.expand     # 260525Cl 除去
    - navigation.indexes
    - navigation.footer    # 260525Cl: 前/次ページリンクを本文下部に表示 (手書きの本文内ナビ行は廃止)
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate   # 260525Cl 追加: コード内に丸数字の注釈マーカーを置ける (マクロ例の解説用)
    - content.action.edit     # 260525Cl 追加: 各ページに GitHub 編集リンクを表示 (edit_uri 設定済み・認証は GitHub 側が処理)
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - ja
  # 260525Cl 追加: スクリーンショットをクリックで拡大表示 (ライトボックス)。mkdocs-glightbox が必要。
  - glightbox
  # 260525Cl 追加: manual 再編 (260525) より前のフラットなページ URL を新パスへ 301 相当でリダイレクトし、
  #   過去に公開済みの旧 URL の 404 を防ぐ。mkdocs-redirects が必要。キー=旧パス / 値=新パス (いずれも src 相対)。
  - redirects:
      redirect_maps:
        # 260526Cl: メインウィンドウは EN/JA とも単一フラットページ (0-main-window.md) に統合。
        #   crystal-orientation-control の旧サブページ URL (本日公開) はフラットページへリダイレクトする。
        #   ※ '…/0-main-window/index.md' → '…/0-main-window.md' は張らない: use_directory_urls では
        #     両者が同一 URL /0-main-window/ になり自己参照 meta-refresh = 無限リロードになるため (方針 §5)。
        'en/0-1-crystal-orientation-control.md': 'en/0-main-window.md'
        'en/0-main-window/1-crystal-orientation-control.md': 'en/0-main-window.md'
        'ja/0-main-window/1-crystal-orientation-control.md': 'ja/0-main-window.md'
        'en/11-symmetry-information.md': 'en/2-symmetry-information.md'
        'en/12-scattering-factor.md': 'en/3-scattering-factor.md'
        'en/3-rotation-geometry.md': 'en/4-rotation-geometry.md'
        # 260526Cl/260602Cl: 7章を SAED(7.1)/PED(7.2)/CBED(7.3)/X線・中性子(7.4) の順へ再編。旧フラット/フォルダURLを現ファイル名へ。
        'en/7-1-saed-simulation.md': 'en/7-diffraction-simulator/1-saed-simulation.md'
        'en/7-2-x-ray-diffraction.md': 'en/7-diffraction-simulator/4-x-ray-neutron-diffraction.md'
        'en/7-3-ped-simulation.md': 'en/7-diffraction-simulator/2-ped-simulation.md'
