      - 9.3. Potential simulation: 9-hrtem-stem-simulator/3-potential-simulation.md
  - 10. Spot ID v1: 10-spot-id.md
  - 11. Spot ID v2: 11-spot-id-v2.md
  - 12. EBSD simulation: 12-ebsd-simulation.md
  - 20. Macro:
      - 20-macro/index.md
      - 20.1. Built-in functions: 20-macro/1-built-in-functions.md
