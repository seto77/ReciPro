# 260525Ch: MkDocs Material configuration for the GitHub Pages manual.
# 260622Cl: 多言語化のため mkdocs-static-i18n (folder mode) へ移行。
#   - en を default locale としてサイトルート (/ReciPro/) へ、ja を /ReciPro/ja/ へ出力。
#   - 未訳ページは fallback_to_default で英語本文をローカライズ URL に自動生成 (ページ単位の増分公開)。
#   - 言語切替は reconfigure_material が Material のセレクタを現在ページ基準で自動構成 (旧 language_switch.js は廃止)。
#   詳細・設計判断は .project-guidance/ReciPro_Pages多言語化計画.md。
site_name: ReciPro Manual
site_description: ReciPro user manual
site_url: https://seto77.github.io/ReciPro/
repo_url: https://github.com/seto77/ReciPro
repo_name: seto77/ReciPro
edit_uri: edit/master/docs/src/

docs_dir: src
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: en
  custom_dir: overrides   # 260622Cl: 未訳=英語フォールバックを知らせるバナー (overrides/main.html)
  features:
    # 260622Cl: navigation.tabs / navigation.tabs.sticky は言語タブ用途だったため撤去。
    #   多言語化後は言語選択をヘッダーのセレクタ (static-i18n が構成) に一本化し、
    #   nav は 1 言語ぶん (章立て) を左サイドバーに出す。
    # 260525Cl: navigation.indexes でセクション見出し自体を概要ページ (index.md) へのリンクにする。
    - navigation.indexes
    - navigation.footer    # 前/次ページリンクを本文下部に表示
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# 260622Cl: 旧英語 URL (/en/<slug>/) → 新ルート URL (/<slug>/) 互換の stub を post-build で生成。
#   mkdocs-redirects は static-i18n 再ホーム後のルート URL を target にできない (実測) ため、英語の /en/ 互換は
#   このフックが担当する。JA リネーム履歴は下の redirects プラグインが担当 (責務分離)。
hooks:
  - hooks/legacy_en_redirects.py

plugins:
  - search:
      lang:
        - en
        - ja
  - glightbox
  # 260622Cl: 多言語化プラグイン。languages は en (default=ルート出力) / ja。新言語はここに 1 行ずつ追加していく。
  #   redirects より前に置く: redirects (JA リネーム履歴) は i18n 適用後のファイル URL を解決する必要がある。
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            0. Main window: 0. メインウィンドウ
            1. Crystal database: 1. 結晶データベース
            2. Symmetry information: 2. 対称性情報
            3. Beam interaction: 3. ビーム相互作用
            4. Rotation Geometry: 4. 回転ジオメトリ
            5. Structure viewer: 5. 結晶構造ビューア
            6. Stereonet: 6. ステレオネット
            7. Diffraction simulator: 7. 回折シミュレータ
            7.1. SAED simulation: 7.1. SAEDシミュレーション
            7.2. PED simulation: 7.2. PEDシミュレーション
            7.3. CBED simulation: 7.3. CBEDシミュレーション
            "7.4. X-ray / neutron diffraction": 7.4. X線・中性子線回折シミュレーション
            8. Electron trajectory: 8. 電子飛程
            9. HRTEM/STEM simulator: 9. HRTEM/STEMシミュレータ
            9.1. HRTEM simulation: 9.1. HRTEMシミュレーション
            9.2. STEM simulation: 9.2. STEMシミュレーション
            9.3. Potential simulation: 9.3. ポテンシャルシミュレーション
            12. EBSD simulation: 12. EBSDシミュレーション
            20. Macro: 20. マクロ
            20.1. Built-in functions: 20.1. 組み込み関数一覧
            20.2. Examples: 20.2. マクロの使用例
            21. Keyboard & mouse shortcuts: 21. キーボード・マウスショートカット
            Appendix: 付録
            How to use (videos): How to use（動画）
            "Appendix A1. Coordinate systems": Appendix A1. 座標系の定義
            A1.1. Basic coordinate system and crystal orientation: A1.1. 基本座標系と結晶方位の定義
            A1.2. Coordinate system for diffraction simulation: A1.2. 回折シミュレーションにおける座標系の定義
            "Appendix A2. Beam interaction (solid-state background)": Appendix A2. ビーム相互作用（固体物理的背景）
            A2.1. Atomic scattering factors: A2.1. 原子散乱因子
            A2.2. Structure factor: A2.2. 構造因子
            "A2.3. Attenuation & transport": A2.3. 減衰・輸送
            A2.4. Fluorescence: A2.4. 蛍光
            "Appendix A3. Dynamical diffraction (Bloch-wave method)": Appendix A3. 動力学回折（Bloch波法）
            A3.1. Dynamical calculation: A3.1. 動力学計算
            A3.2. HRTEM image formation: A3.2. HRTEM 像形成
            Troubleshooting: トラブルシューティング
  # 260622Cl: 日本語ページのリネーム/移動履歴の redirect。JA は /ja/ 配下のままなので value (ja/新.md) が
  #   正しいルート URL に解決される。英語 (/en/) 系は legacy_en_redirects.py フックが担当するため入れない。
  #   i18n の後に置くこと (i18n 適用後の File URL を解決させるため)。
  #   罠: 'foo.md':'foo/index.md' 形の自己ループ redirect を張らない (use_directory_urls で同一 URL)。
  - redirects:
      redirect_maps:
        'ja/11-symmetry-information.md': 'ja/2-symmetry-information.md'
        'ja/12-scattering-factor.md': 'ja/3-beam-interaction.md'
        'ja/3-scattering-factor.md': 'ja/3-beam-interaction.md'
        'ja/3-rotation-geometry.md': 'ja/4-rotation-geometry.md'
        'ja/7-1-saed-simulation.md': 'ja/7-diffraction-simulator/1-saed-simulation.md'
        'ja/7-2-x-ray-diffraction.md': 'ja/7-diffraction-simulator/4-x-ray-neutron-diffraction.md'
        'ja/7-3-ped-simulation.md': 'ja/7-diffraction-simulator/2-ped-simulation.md'
        'ja/7-4-cbed-simulation.md': 'ja/7-diffraction-simulator/3-cbed-simulation.md'
        'ja/7-diffraction-simulator/2-x-ray-diffraction.md': 'ja/7-diffraction-simulator/4-x-ray-neutron-diffraction.md'
        'ja/7-diffraction-simulator/1-x-ray-diffraction.md': 'ja/7-diffraction-simulator/4-x-ray-neutron-diffraction.md'
        'ja/7-diffraction-simulator/2-saed-simulation.md': 'ja/7-diffraction-simulator/1-saed-simulation.md'
        'ja/7-diffraction-simulator/3-ped-simulation.md': 'ja/7-diffraction-simulator/2-ped-simulation.md'
        'ja/7-diffraction-simulator/4-cbed-simulation.md': 'ja/7-diffraction-simulator/3-cbed-simulation.md'
        'ja/8-1-hrtem-simulation.md': 'ja/9-hrtem-stem-simulator/1-hrtem-simulation.md'
        'ja/8-2-stem-simulation.md': 'ja/9-hrtem-stem-simulator/2-stem-simulation.md'
        'ja/8-3-potential-simulation.md': 'ja/9-hrtem-stem-simulator/3-potential-simulation.md'
        'ja/8-hrtem-stem-simulator/index.md': 'ja/9-hrtem-stem-simulator/index.md'
        'ja/13-electron-trajectory.md': 'ja/8-electron-trajectory.md'
        'ja/10-1-spot-id-v2.md': 'ja/11-spot-id-v2.md'
        'ja/14-ebsd-simulation.md': 'ja/12-ebsd-simulation.md'
        'ja/20-1-built-in-functions.md': 'ja/20-macro/1-built-in-functions.md'
        'ja/20-2-examples.md': 'ja/20-macro/2-examples.md'
        'ja/appendix-a0-how-to-use.md': 'ja/appendix/a0-how-to-use.md'
        'ja/appendix-a1-coordinate-system.md': 'ja/appendix/a1-coordinate-system/1-orientation.md'
        'ja/appendix/a1-coordinate-system.md': 'ja/appendix/a1-coordinate-system/1-orientation.md'
        'ja/appendix-a2-detector-coordinate-system.md': 'ja/appendix/a1-coordinate-system/2-diffraction.md'
        'ja/appendix/a2-detector-coordinate-system.md': 'ja/appendix/a1-coordinate-system/2-diffraction.md'
        'ja/appendix/a2-bloch-wave-method.md': 'ja/appendix/a3-bloch-wave/index.md'
        'ja/appendix/a3-bloch-wave-calculation.md': 'ja/appendix/a3-bloch-wave/calculation.md'
        'ja/appendix/a2-bloch-wave/index.md': 'ja/appendix/a3-bloch-wave/index.md'
        'ja/appendix/a2-bloch-wave/calculation.md': 'ja/appendix/a3-bloch-wave/calculation.md'
        'ja/appendix/a2-bloch-wave/hrtem.md': 'ja/appendix/a3-bloch-wave/hrtem.md'
        'ja/appendix/a2-bloch-wave/cbed.md': 'ja/appendix/a3-bloch-wave/cbed.md'
        'ja/appendix/a2-bloch-wave/stem.md': 'ja/appendix/a3-bloch-wave/stem.md'
        'ja/appendix/a2-bloch-wave/ebsd.md': 'ja/appendix/a3-bloch-wave/ebsd.md'

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      # 260602Cl: 日本語見出しの slug を機能させる (pymdownx の Unicode slugify)。
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - abbr
  - pymdownx.snippets:
      base_path:
        - docs
        - .
      auto_append:
        - includes/abbreviations.md
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  # 260622Cl: 言語切替 JS (language_switch.js) は static-i18n の reconfigure_material が
  #   現在ページ基準のセレクタを構成するため不要になり廃止。

# 260622Cl: extra.alternate は static-i18n が自動構成するため手書きしない。

